name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    test:
        name: KMP Unit Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                java-version: '17'
                distribution: 'temurin'
            
            - name: Set up Android SDK
              uses: android-actions/setup-android@v3

            - name: Cache Gradle caches & wrapper
              uses: actions/cache@v4
              with:
                path: |
                    ~/.gradle/caches
                    ~/.gradle/wrapper
                key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/**/gradle-wrapper.properties') }}
                restore-keys: |
                    ${{ runner.os }}-gradle-

            - name: Run Tests
              run: .gradlew/ allTests
            
            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: kmp-test-reports
                path: android/shared/build/reports/tests/
                retention-days: 14
